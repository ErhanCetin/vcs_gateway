version: "3.9"

# =============================================================================
# Full local dev stack: application + all infrastructure
#
# Usage:
#   docker compose up -d            # start everything
#   docker compose up -d --build    # rebuild app image first
#   docker compose logs -f vcs-gateway
#
# Infra only (no app):
#   docker compose -f docker-compose.infra.yml up -d
# =============================================================================

include:
  - docker-compose.infra.yml

services:

  # ---------------------------------------------------------------------------
  # Application — API server
  # ---------------------------------------------------------------------------
  vcs-gateway:
    build:
      context: .
      target: runtime
    ports:
      - "8001:8001"
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src  # Hot reload in local dev
    command: uvicorn vcs_gateway.main:app --host 0.0.0.0 --port 8001 --reload

  # Uncomment if this service also runs a queue worker
  # vcs-gateway-worker:
  #   build:
  #     context: .
  #     target: runtime
  #   env_file:
  #     - .env.local
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   command: python -m vcs_gateway.worker
